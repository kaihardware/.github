name: Feature request
description: Propose an outcome, not just a mechanism
title: "[Feature]: "
labels: ["type:feature", "status:triage"]
body:
  - type: textarea
    id: problem
    attributes: {label: Problem, description: Who experiences what friction, in what context?}
    validations: {required: true}
  - type: textarea
    id: outcome
    attributes: {label: Desired outcome, description: How would we know this improved the experience?}
    validations: {required: true}
  - type: textarea
    id: evidence
    attributes: {label: Evidence or observations}
  - type: textarea
    id: constraints
    attributes: {label: Constraints and tradeoffs}
  - type: textarea
    id: alternatives
    attributes: {label: Alternatives considered}
